spring:
  application:
    name: vehicle-management
  profiles:
    default: local
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
  
  flyway:
    enabled: true
    baseline-on-migrate: false


    

