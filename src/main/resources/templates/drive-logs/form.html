<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>새 기록 작성</title>
</head>


<th:block layout:fragment="content">
    <div class="page-title print-hide">
        <div>
            <h2>새 운행 기록 작성</h2>
            <div class="page-subtitle">주행거리 자동 계산 및 입력값 검증을 포함합니다.</div>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" href="/drive-logs">목록</a>
        </div>
    </div>

    <div class="v-card">
        <div class="v-card-header">
            <h4>운행 기록 입력</h4>
            <span class="text-muted small">* 표시는 필수 입력</span>
        </div>

        <div class="v-card-body">
            <form id="driveLogForm" novalidate>

                <div class="mb-3">
                    <label class="form-label required">사용일자</label>
                    <input type="date" class="form-control" id="driveDate" name="driveDate" required>
                    <div class="help-text mt-1">※ 시스템에 저장된 마지막 사용일자 이후로만 선택 가능합니다.</div>
                    <div class="field-error" data-field-error="driveDate"></div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label required">부서</label>
                        <select class="form-select" id="departmentId" name="departmentId" required>
                            <option value="">선택</option>
                        </select>
                        <div class="field-error" data-field-error="departmentId"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label required">성명</label>
                        <input type="text" class="form-control" id="driverName" name="driverName" required placeholder="예) 홍길동">
                        <div class="field-error" data-field-error="driverName"></div>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label required">주행 전 계기판 거리(km)</label>
                        <input type="number" class="form-control" id="startMileage" name="startMileage" required min="0">
                        <div class="field-error" data-field-error="startMileage"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label required">주행 후 계기판 거리(km)</label>
                        <input type="number" class="form-control" id="endMileage" name="endMileage" required min="0">
                        <div class="field-error" data-field-error="endMileage"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">총 주행거리(km) <small class="text-muted">(자동 계산)</small></label>
                        <input type="text" class="form-control" id="totalDistance" readonly value="0">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label required">출·퇴근용 거리(km)</label>
                        <input type="number" class="form-control" id="commuteDistance" name="commuteDistance" value="0" required min="0">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label required">일반 업무용 거리(km)</label>
                        <input type="number" class="form-control" id="businessDistance" name="businessDistance" value="0" required min="0">
                    </div>

                    <div class="col-12 mt-2">
                        <div class="field-error" id="distanceWarning" style="display:none;">
                            출·퇴근용(km)과 일반 업무용(km)의 합이 총 주행거리와 같아야 합니다.
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label required">비고 (방문지 및 특이사항)</label>
                    <input type="text" class="form-control" id="remarks" name="remarks" maxlength="255" required placeholder="예) 고객사 방문 / 정비소">
                </div>

                <div class="d-flex justify-content-between">
                    <a href="/drive-logs" class="btn btn-outline-secondary">취소</a>
                    <button type="submit" class="btn btn-primary" id="submitBtn">저장하기</button>
                </div>
            </form>
        </div>
    </div>

</th:block>

<th:block layout:fragment="script">
    <script type="module" src="/js/pages/drive-log-form.js"></script>
</th:block>

</html>
