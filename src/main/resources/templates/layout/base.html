<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>업무용 차량 주행 정보 관리</title>

    <!-- Bootstrap -->
    <link href="/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <!-- App CSS (design system) -->
    <link href="/css/app.css" rel="stylesheet">

    <th:block layout:fragment="css"></th:block>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark app-header print-hide">
    <div class="container-fluid">
        <a class="navbar-brand" href="/drive-logs">Vehicle Management</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/drive-logs">운행 기록 목록</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/drive-logs/new">새 기록 작성</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- toast / loading (공통 UI) -->
<div class="toast-stack" id="toastStack"></div>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
        <div class="spinner-border" role="status" aria-hidden="true"></div>
        <div>처리 중...</div>
    </div>
</div>

<div class="page-wrap">
    <th:block layout:fragment="content"></th:block>
</div>

<!-- Bootstrap JS -->
<script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

<!-- Common JS -->
<script src="/js/common/util.js"></script>
<script src="/js/common/ui.js"></script>
<script src="/js/common/http.js"></script>

<th:block layout:fragment="script"></th:block>
</body>
</html>
