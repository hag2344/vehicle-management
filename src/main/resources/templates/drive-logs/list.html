<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>운행 기록 목록</title>
</head>

<th:block layout:fragment="content">
    <div class="page-title print-hide">
        <div>
            <h2>차량 운행 기록</h2>
            <div class="page-subtitle">검색/페이징 및 프린트 출력을 지원합니다.</div>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary" id="btnPrint" type="button">프린트</button>
            <a href="/drive-logs/new" class="btn btn-primary">새 기록 작성</a>
        </div>
    </div>

    <!-- KPI -->
    <div class="kpi-grid print-hide">
        <div class="v-card kpi-item">
            <div class="kpi-label">최신 주행 후 거리</div>
            <div class="kpi-value" id="kpiLastMileage">-</div>
            <div class="kpi-hint" id="kpiLastDate">-</div>
        </div>
        <div class="v-card kpi-item">
            <div class="kpi-label">조회 조건</div>
            <div class="kpi-value" id="kpiFilterSummary">전체</div>
            <div class="kpi-hint">기간/부서/성명</div>
        </div>
        <div class="v-card kpi-item">
            <div class="kpi-label">조회 결과</div>
            <div class="kpi-value" id="kpiCount">-</div>
            <div class="kpi-hint">현재 페이지 기준</div>
        </div>
    </div>

    <!-- Search -->
    <div class="v-card mb-3 print-hide">
        <div class="v-card-header">
            <h4>검색</h4>
            <div class="text-muted small">조건을 입력하고 조회하세요</div>
        </div>

        <div class="v-card-body">
            <form id="searchForm" class="row g-2">
                <div class="col-md-3">
                    <label class="form-label">시작일</label>
                    <input type="date" class="form-control" id="startDate" name="startDate">
                </div>

                <div class="col-md-3">
                    <label class="form-label">종료일</label>
                    <input type="date" class="form-control" id="endDate" name="endDate">
                </div>

                <div class="col-md-3">
                    <label class="form-label">부서</label>
                    <select class="form-select" id="departmentId" name="departmentId">
                        <option value="">전체</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">성명</label>
                    <input type="text" class="form-control" id="driverName" name="driverName" placeholder="성명 입력">
                </div>

                <div class="col-12 d-flex justify-content-end gap-2 mt-2">
                    <button type="button" class="btn btn-outline-secondary" id="btnReset">초기화</button>
                    <button type="submit" class="btn btn-dark">검색</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Print Title -->
    <h3 class="d-none d-print-block">2. 업무용 사용비율 계산</h3>

    <!-- Table -->
    <div class="table-wrap">
        <table class="table table-bordered table-sm">
            <thead>
            <tr>
                <th rowspan="2">사용일자<br>(요일)</th>
                <th colspan="2">사용자</th>
                <th rowspan="2">주행 전<br>계기판 거리(km)</th>
                <th rowspan="2">주행 후<br>계기판 거리(km)</th>
                <th rowspan="2">주행거리(km)</th>
                <th colspan="2">운행 내역 (업무용 사용거리)</th>
                <th rowspan="2">비고<br>(방문지 및 특이사항)</th>
            </tr>
            <tr>
                <th>부서</th>
                <th>성명</th>
                <th>출·퇴근용(km)</th>
                <th>일반 업무용(km)</th>
            </tr>
            </thead>

            <tbody id="logTableBody">
            <tr><td colspan="9" class="text-center">로딩중...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <nav class="print-hide mt-3">
        <ul class="pagination justify-content-center" id="pagination"></ul>
    </nav>
</div>

<th:block layout:fragment="script">
    <script type="module" src="/js/pages/drive-log-list.js"></script>
</th:block>
</th:block>
</html>
