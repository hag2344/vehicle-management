<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}">

<head>
    <title>운행 기록 목록</title>
</head>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4 print-hide">
        <h2>차량 운행 기록</h2>
        <div>
            <button class="btn btn-secondary me-2" onclick="window.print()">프린트</button>
            <a href="/drive-logs/new" class="btn btn-primary">새 기록 작성</a>
        </div>
    </div>

    <!-- Search Form -->
    <div class="card mb-4 print-hide">
        <div class="card-body">
            <form id="searchForm" class="row border-bottom-0">
                <div class="col-md-3 mb-2">
                    <label class="form-label">시작일</label>
                    <input type="date" class="form-control" id="startDate" name="startDate">
                </div>
                <div class="col-md-3 mb-2">
                    <label class="form-label">종료일</label>
                    <input type="date" class="form-control" id="endDate" name="endDate">
                </div>
                <div class="col-md-3 mb-2">
                    <label class="form-label">부서</label>
                    <select class="form-select" id="departmentId" name="departmentId">
                        <option value="">전체</option>
                    </select>
                </div>
                <div class="col-md-3 mb-2">
                    <label class="form-label">성명</label>
                    <input type="text" class="form-control" id="driverName" name="driverName" placeholder="성명 입력">
                </div>
                <div class="col-12 text-end mt-2">
                    <button type="submit" class="btn btn-dark">검색</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Data Table matching Excel -->
    <h3 class="print-only d-none d-print-block">2. 업무용 사용비율 계산</h3>
    <table class="table table-bordered table-sm">
        <thead class="table-light text-center">
            <tr>
                <th rowspan="2">사용일자<br>(요일)</th>
                <th colspan="2">사용자</th>
                <th rowspan="2">주행 전<br>계기판 거리(km)</th>
                <th rowspan="2">주행 후<br>계기판 거리(km)</th>
                <th rowspan="2">주행거리(km)</th>
                <th colspan="2">운행 내역 (업무용 사용거리)</th>
                <th rowspan="2">비고<br>(방문지 및 특이사항)</th>
            </tr>
            <tr>
                <th>부서</th>
                <th>성명</th>
                <th>출·퇴근용(km)</th>
                <th>일반 업무용(km)</th>
            </tr>
        </thead>
        <tbody id="logTableBody">
            <tr>
                <td colspan="9" class="text-center">로딩중...</td>
            </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <nav class="print-hide">
        <ul class="pagination justify-content-center" id="pagination">
        </ul>
    </nav>
</div>

<th:block layout:fragment="script">
    <script>
        let departmentsMap = {};
        let currentPage = 0;

        document.addEventListener("DOMContentLoaded", async function () {
            await loadDepartments();
            loadLogs(0);

            document.getElementById('searchForm').addEventListener('submit', function (e) {
                e.preventDefault();
                loadLogs(0);
            });
        });

        async function loadDepartments() {
            try {
                const res = await fetch('/api/v1/departments');
                const json = await res.json();
                const data = json.data;
                const select = document.getElementById('departmentId');
                data.forEach(dep => {
                    departmentsMap[dep.id] = dep.name;
                    const opt = document.createElement('option');
                    opt.value = dep.id;
                    opt.textContent = dep.name;
                    select.appendChild(opt);
                });
            } catch (e) {
                console.error("Failed to load departments", e);
            }
        }

        async function loadLogs(page) {
            currentPage = page;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const departmentId = document.getElementById('departmentId').value;
            const driverName = document.getElementById('driverName').value;

            let query = `?page=${page}&size=20`;
            if (startDate) query += `&startDate=${startDate}`;
            if (endDate) query += `&endDate=${endDate}`;
            if (departmentId) query += `&departmentId=${departmentId}`;
            if (driverName) query += `&driverName=${encodeURIComponent(driverName)}`;

            try {
                const res = await fetch('/api/v1/drive-logs' + query);
                const json = await res.json();
                const data = json.data;
                renderTable(data.content);
                renderPagination(data);
            } catch (e) {
                console.error("Failed to load logs", e);
                document.getElementById('logTableBody').innerHTML = `<tr><td colspan="9" class="text-center text-danger">데이터를 불러오는 중 오류가 발생했습니다.</td></tr>`;
            }
        }

        function renderTable(logs) {
            const tbody = document.getElementById('logTableBody');
            tbody.innerHTML = '';
            if (logs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center">조회된 운행 기록이 없습니다.</td></tr>`;
                return;
            }

            const days = ['일', '월', '화', '수', '목', '금', '토'];

            logs.forEach(log => {
                const dateObj = new Date(log.driveDate);
                const dayStr = days[dateObj.getDay()];
                const tr = document.createElement('tr');

                tr.innerHTML = `
                <td>${log.driveDate}<br>(${dayStr})</td>
                <td>${departmentsMap[log.departmentId] || '-'}</td>
                <td>${log.driverName}</td>
                <td>${log.startMileage}</td>
                <td>${log.endMileage}</td>
                <td>${log.totalDistance}</td>
                <td>${log.commuteDistance}</td>
                <td>${log.businessDistance}</td>
                <td>${log.remarks || ''}</td>
            `;
                tbody.appendChild(tr);
            });
        }

        function renderPagination(pageData) {
            const ul = document.getElementById('pagination');
            ul.innerHTML = '';
            if (pageData.totalPages <= 1) return;

            // Prev
            const prevLi = document.createElement('li');
            prevLi.className = `page-item ${pageData.first ? 'disabled' : ''}`;
            prevLi.innerHTML = `<a class="page-link" href="#" onclick="event.preventDefault(); loadLogs(${currentPage - 1})">이전</a>`;
            ul.appendChild(prevLi);

            // Pages (simple version without complex sliding window)
            for (let i = 0; i < pageData.totalPages; i++) {
                const li = document.createElement('li');
                li.className = `page-item ${i === currentPage ? 'active' : ''}`;
                li.innerHTML = `<a class="page-link" href="#" onclick="event.preventDefault(); loadLogs(${i})">${i + 1}</a>`;
                ul.appendChild(li);
            }

            // Next
            const nextLi = document.createElement('li');
            nextLi.className = `page-item ${pageData.last ? 'disabled' : ''}`;
            nextLi.innerHTML = `<a class="page-link" href="#" onclick="event.preventDefault(); loadLogs(${currentPage + 1})">다음</a>`;
            ul.appendChild(nextLi);
        }
    </script>
</th:block>

</html>
